name: CI
on:
  push:
    branches: [main, staging]
  pull_request:
    branches: [main]

env:
  SUPABASE_URL: https://lipjakzhzosrhttsltwo.supabase.co
  SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
  NODE_VERSION: "20"
  DENO_VERSION: v2.x

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: web/package-lock.json
      - run: npm ci
        working-directory: web
      - run: npm run lint
        working-directory: web
        continue-on-error: true

  typecheck:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: web/package-lock.json
      - run: npm ci
        working-directory: web
      - run: npm run typecheck
        working-directory: web
        continue-on-error: true

  edge-quality-gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: denoland/setup-deno@v2
        with:
          deno-version: ${{ env.DENO_VERSION }}
      - name: Deno check all edge functions
        run: |
          errors=0
          for fn in supabase/functions/*/index.ts; do
            echo "Checking $fn..."
            if ! deno check --config supabase/deno.json "$fn" 2>&1; then
              echo "FAIL: $fn"
              errors=$((errors + 1))
            fi
          done
          if [ "$errors" -gt 0 ]; then
            echo "$errors functions failed deno check"
            exit 1
          fi
          echo "All edge functions pass deno check"
      - name: Prohibit auth.user bug
        run: |
          found=$(grep -rn "auth\.user\." supabase/functions/ 2>/dev/null || true)
          if [ -n "$found" ]; then
            echo "ERROR: Found auth.user. access — use verifyAuth() destructured values instead:"
            echo "$found"
            exit 1
          fi
          echo "No auth.user patterns found"
      - name: Verify cors imports
        run: |
          errors=0
          for fn in supabase/functions/*/index.ts; do
            if grep -q 'from.*["'\'']\.\./cors["'\'']' "$fn" 2>/dev/null; then
              echo "FAIL: $fn imports from cors.ts instead of auth-helper.ts"
              errors=$((errors + 1))
            fi
          done
          if [ "$errors" -gt 0 ]; then
            exit 1
          fi
          echo "All imports correct"

  build:
    runs-on: ubuntu-latest
    needs: typecheck
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: web/package-lock.json
      - run: npm ci
        working-directory: web
      - run: npm run build
        working-directory: web

  test-edge-functions:
    runs-on: ubuntu-latest
    needs: edge-quality-gate
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/staging'
    steps:
      - uses: actions/checkout@v4
      - name: Integration test
        env:
          TEST_EMAIL: ${{ secrets.TEST_USER_EMAIL }}
          TEST_PASSWORD: ${{ secrets.TEST_USER_PASSWORD }}
        run: |
          chmod +x scripts/test-ai-functions.sh
          ./scripts/test-ai-functions.sh "$TEST_EMAIL" "$TEST_PASSWORD"
