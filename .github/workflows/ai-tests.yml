name: AI Functions CI
on:
  push:
    branches: [main, staging]
    paths:
      - 'supabase/functions/ai-*/**'
      - 'scripts/test-ai-functions.sh'
  pull_request:
    paths:
      - 'supabase/functions/ai-*/**'
      - 'scripts/test-ai-functions.sh'

env:
  SUPABASE_URL: https://lipjakzhzosrhttsltwo.supabase.co
  SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x
      - name: TypeScript check AI functions
        run: |
          for fn in supabase/functions/ai-*/index.ts; do
            echo "Checking $fn..."
            deno check "$fn" 2>&1 || true
          done

  integration-test:
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run AI function integration tests
        env:
          TEST_EMAIL: ${{ secrets.TEST_USER_EMAIL }}
          TEST_PASSWORD: ${{ secrets.TEST_USER_PASSWORD }}
        run: |
          chmod +x scripts/test-ai-functions.sh
          ./scripts/test-ai-functions.sh "$TEST_EMAIL" "$TEST_PASSWORD"
